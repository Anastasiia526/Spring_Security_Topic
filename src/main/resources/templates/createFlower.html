<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create new Flower</title>
</head>
<body>
<form th:method="POST" th:action="@{/flowers}" th:object="${flower}">
    <label for="name">Enter name: </label>
    <input type="text" th:field="*{name}" id="name"/>
    <div style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
    <br/>
    <label for="latinName">Enter latinName: </label>
    <input type="text" th:field="*{latinName}" id="latinName"/>
    <div style="color:red" th:if="${#fields.hasErrors('latinName')}" th:errors="*{latinName}">Latin Name Error</div>
    <br/>
    <label for="type">Enter type: </label>
    <input type="text" th:field="*{type}" id="type"/>
    <div style="color:red" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">Type Error</div>
    <br/>
    <label for="room">Enter room: </label>
    <input type="text" th:field="*{room}" id="room"/>
    <div style="color:red" th:if="${#fields.hasErrors('room')}" th:errors="*{room}">Room Error</div>
    <br/>
    <label for="healthStatus">Enter healthStatus: </label>
    <input type="text" th:field="*{healthStatus}" id="healthStatus"/>
    <div style="color:red" th:if="${#fields.hasErrors('healthStatus')}" th:errors="*{healthStatus}">Health Status Error</div>
    <br/>
    <input type="submit" value="Create!"/>
</form>
</body>
</html>
